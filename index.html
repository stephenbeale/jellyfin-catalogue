<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jellyfin Catalogue</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a2e;
    --card: #16213e;
    --accent: #00b4d8;
    --accent-dim: #0077b6;
    --text: #e0e0e0;
    --text-muted: #8a8a9a;
    --border: #2a2a4a;
    --search-bg: #1e1e3a;
    --tag-bg: #252545;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header h1 {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header h1 span { font-size: 1.4rem; }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
  }

  .tab {
    flex: 1;
    padding: 10px 8px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .tab.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: #fff;
  }

  .tab .count {
    display: block;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .controls {
    display: flex;
    gap: 8px;
  }

  .search-box {
    flex: 1;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 10px 12px 10px 36px;
    background: var(--search-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
  }

  .search-box input:focus { border-color: var(--accent); }

  .search-box::before {
    content: '\1F50D';
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.9rem;
    pointer-events: none;
  }

  .sort-btn {
    padding: 10px 14px;
    background: var(--search-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 0.85rem;
    cursor: pointer;
    white-space: nowrap;
  }

  .sort-btn:active { background: var(--card); }

  .filter-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .filter-pill {
    padding: 4px 10px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text-muted);
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-pill.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: #fff;
  }

  .filter-pill:not(.active):hover {
    border-color: var(--text-muted);
  }

  .card-people {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .card-people .director-label {
    color: var(--accent);
  }

  .results-info {
    padding: 8px 16px;
    font-size: 0.8rem;
    color: var(--text-muted);
    background: var(--bg);
  }

  .cards {
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card {
    background: var(--card);
    border-radius: 10px;
    padding: 14px;
    border: 1px solid var(--border);
  }

  .card-title {
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .card-year {
    color: var(--accent);
    font-weight: 400;
    margin-left: 6px;
    font-size: 0.9rem;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 8px 0;
    align-items: center;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 500;
  }

  .badge-label { opacity: 0.6; margin-right: 3px; font-weight: 400; }
  .badge-cert { background: #3a2a0a; color: #f0c040; }
  .badge-rating { background: #0a2a1a; color: #40d080; }
  .badge-runtime { background: #1a1a3a; color: #8080d0; }
  .badge-bluray { background: #1a1a3a; color: #60a0ff; font-weight: 600; }
  .badge-hd { background: #1a2a1a; color: #80c060; }
  .badge-dvd { background: #2a2a2a; color: #999; }
  .badge-episodes { background: #1a2a3a; color: #60b0e0; }
  .badge-oscar { background: #3a2a0a; color: #ffd700; }

  .card-genres {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 6px;
  }

  .genre-tag {
    padding: 2px 8px;
    background: var(--tag-bg);
    border-radius: 12px;
    font-size: 0.7rem;
    color: var(--text-muted);
    cursor: pointer;
    border: 1px solid transparent;
    transition: border-color 0.2s, background 0.2s;
  }

  .genre-tag:hover {
    border-color: var(--accent);
    background: var(--search-bg);
  }

  .badge-cert[data-filter] {
    cursor: pointer;
    transition: border-color 0.2s;
    border: 1px solid transparent;
  }

  .badge-cert[data-filter]:hover {
    border-color: #f0c040;
  }

  .card-artist {
    font-size: 0.85rem;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .card-overview {
    font-size: 0.8rem;
    color: var(--text-muted);
    line-height: 1.4;
    margin-top: 6px;
  }

  .footer {
    text-align: center;
    padding: 20px 16px;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 1rem;
  }

  .no-results {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }

  @media (min-width: 600px) {
    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 12px;
    }
  }

  @media (min-width: 900px) {
    .cards { grid-template-columns: repeat(3, 1fr); }
    .header { padding: 16px 24px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>&#127916;</span> Jellyfin Catalogue</h1>

  <div class="tabs">
    <button class="tab active" data-tab="movies">
      <span class="count" id="count-movies">-</span>Movies
    </button>
    <button class="tab" data-tab="tv">
      <span class="count" id="count-tv">-</span>TV
    </button>
    <button class="tab" data-tab="music">
      <span class="count" id="count-music">-</span>Music
    </button>
  </div>

  <div class="controls">
    <div class="search-box">
      <input type="text" id="search" placeholder="Search all fields..." autocomplete="off">
    </div>
    <button class="sort-btn" id="sort-btn">A-Z</button>
  </div>

  <div class="filter-pills" id="filter-pills">
    <button class="filter-pill active" data-filter="all">All</button>
    <button class="filter-pill" data-filter="title">Title</button>
    <button class="filter-pill" data-filter="genre">Genre</button>
    <button class="filter-pill" data-filter="year">Year</button>
    <button class="filter-pill" data-filter="actor">Actor</button>
    <button class="filter-pill" data-filter="director">Director</button>
    <button class="filter-pill" data-filter="cert">Cert</button>
    <button class="filter-pill" data-filter="oscar">🏆 Oscar</button>
  </div>
</div>

<div class="results-info" id="results-info"></div>
<div class="cards" id="cards"></div>
<div class="footer" id="footer"></div>

<script>
let data = null;
let activeTab = 'movies';
let sortMode = 'name'; // 'name' or 'year'
let searchTerm = '';
let activeFilter = 'all';

async function init() {
  const cardsEl = document.getElementById('cards');
  cardsEl.innerHTML = '<div class="loading">Loading catalogue...</div>';

  try {
    const res = await fetch('catalogue.json');
    data = await res.json();
  } catch (e) {
    cardsEl.innerHTML = '<div class="loading">Failed to load catalogue.json</div>';
    return;
  }

  document.getElementById('count-movies').textContent = data.movies.length;
  document.getElementById('count-tv').textContent = data.tv.length;
  document.getElementById('count-music').textContent = data.music.length;
  document.getElementById('footer').innerHTML =
    'Last updated: ' + formatDate(data.updated) +
    ' &middot; <a href="https://buymeacoffee.com/stephenbeale" target="_blank" rel="noopener noreferrer" style="color:var(--accent,#f0a500);opacity:0.7;">Buy me a coffee</a>';

  updateFilterPills();
  render();
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function render() {
  const items = getFilteredItems();
  const cardsEl = document.getElementById('cards');
  const infoEl = document.getElementById('results-info');

  if (items.length === 0) {
    cardsEl.innerHTML = '<div class="no-results">No results found</div>';
    infoEl.textContent = '';
    return;
  }

  const total = data[activeTab].length;
  infoEl.textContent = (searchTerm || activeFilter === 'oscar')
    ? `${items.length} of ${total} results`
    : `${total} items`;

  cardsEl.innerHTML = items.map(item => renderCard(item)).join('');
}

function getFilteredItems() {
  if (!data) return [];
  let items = [...data[activeTab]];

  if (searchTerm || activeFilter === 'oscar') {
    const q = searchTerm.toLowerCase();
    items = items.filter(item => {
      const g = Array.isArray(item.genres) ? item.genres : item.genres ? [item.genres] : [];
      const a = Array.isArray(item.actors) ? item.actors : item.actors ? [item.actors] : [];

      switch (activeFilter) {
        case 'title':
          return item.name && item.name.toLowerCase().includes(q);
        case 'genre':
          return g.some(v => v.toLowerCase().includes(q));
        case 'year':
          return item.year && String(item.year).includes(q);
        case 'actor':
        case 'artist':
          if (activeTab === 'music') {
            return item.artist && item.artist.toLowerCase().includes(q);
          }
          return a.some(v => v.toLowerCase().includes(q));
        case 'director':
          return item.director && item.director.toLowerCase().includes(q);
        case 'cert':
          return item.cert && item.cert.toLowerCase().includes(q);
        case 'oscar':
          return getOscarWins(item.name, item.year) > 0;
        default: // 'all'
          return [item.name, item.artist, item.director, item.overview, ...g, ...a]
            .some(f => f && f.toLowerCase().includes(q))
            || (item.year && String(item.year).includes(q))
            || (item.cert && item.cert.toLowerCase().includes(q));
      }
    });
  }

  items.sort((a, b) => {
    if (sortMode === 'year') {
      const ya = a.year || 0, yb = b.year || 0;
      if (yb !== ya) return yb - ya;
    }
    return (a.name || '').localeCompare(b.name || '');
  });

  return items;
}

function renderCard(item) {
  let html = '<div class="card">';

  html += `<div class="card-title">${esc(item.name)}`;
  if (item.year) html += `<span class="card-year">(${item.year})</span>`;
  html += '</div>';

  if (item.artist) {
    html += `<div class="card-artist">${esc(item.artist)}</div>`;
  }

  // Director + actors line for movies/TV
  if (item.director || (item.actors && item.actors.length)) {
    const parts = [];
    if (item.director) parts.push(`<span class="director-label">Dir:</span> ${esc(item.director)}`);
    const actors = Array.isArray(item.actors) ? item.actors : [];
    if (actors.length) parts.push(actors.map(a => esc(a)).join(', '));
    html += `<div class="card-people">${parts.join(' | ')}</div>`;
  }

  const genres = Array.isArray(item.genres) ? item.genres : item.genres ? [item.genres] : [];
  if (genres.length) {
    html += '<div class="card-genres">';
    genres.forEach(g => { html += `<span class="genre-tag" data-filter="genre" data-value="${esc(g)}">${esc(g)}</span>`; });
    html += '</div>';
  }

  const meta = [];
  if (item.cert) meta.push(`<span class="badge badge-cert" data-filter="cert" data-value="${esc(item.cert)}">${esc(item.cert)}</span>`);
  if (item.rating) meta.push(`<span class="badge badge-rating"><span class="badge-label">IMDb</span> ${item.rating}</span>`);
  if (item.runtime) meta.push(`<span class="badge badge-runtime"><span class="badge-label">Runtime</span> ${item.runtime} min</span>`);
  if (item.resolution) {
    const [w, h] = item.resolution.split('x').map(Number);
    const maxDim = Math.max(w, h);
    if (maxDim >= 1920) {
      meta.push(`<span class="badge badge-bluray">Blu-ray</span>`);
    } else if (maxDim >= 1280) {
      meta.push(`<span class="badge badge-hd">HD</span>`);
    } else {
      meta.push(`<span class="badge badge-dvd">DVD</span>`);
    }
  }
  if (item.episodes !== undefined) meta.push(`<span class="badge badge-episodes"><span class="badge-label">Episodes</span> ${item.episodes}</span>`);
  const oscars = getOscarWins(item.name, item.year);
  if (oscars > 0) meta.push(`<span class="badge badge-oscar">${'🏆'.repeat(oscars)}</span>`);
  if (meta.length) html += `<div class="card-meta">${meta.join('')}</div>`;

  if (item.overview) {
    html += `<div class="card-overview">${esc(item.overview)}</div>`;
  }

  html += '</div>';
  return html;
}

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// --- Filter pills ---

const filterPlaceholders = {
  all: 'Search all fields...',
  title: 'Search by title...',
  genre: 'Search by genre...',
  year: 'Search by year...',
  actor: 'Search by actor...',
  artist: 'Search by artist...',
  director: 'Search by director...',
  cert: 'Search by certificate...',
  oscar: 'Showing Oscar winners...'
};

function updateFilterPills() {
  const pills = document.getElementById('filter-pills');
  pills.querySelectorAll('.filter-pill').forEach(p => {
    const f = p.dataset.filter;
    // Music: show artist instead of actor/director
    if (activeTab === 'music') {
      p.style.display = (f === 'actor' || f === 'director' || f === 'oscar') ? 'none' : '';
      if (f === 'artist') p.style.display = '';
    } else {
      p.style.display = (f === 'artist') ? 'none' : '';
    }
    p.classList.toggle('active', f === activeFilter);
  });
  document.getElementById('search').placeholder = filterPlaceholders[activeFilter] || filterPlaceholders.all;
}

function setFilter(filter) {
  activeFilter = filter;
  updateFilterPills();
  render();
}

function searchByTag(filter, value) {
  activeFilter = filter;
  searchTerm = value;
  document.getElementById('search').value = value;
  updateFilterPills();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Add artist pill dynamically (it's not in the HTML by default to keep things clean)
(function addArtistPill() {
  const pills = document.getElementById('filter-pills');
  const certPill = pills.querySelector('[data-filter="cert"]');
  const artistPill = document.createElement('button');
  artistPill.className = 'filter-pill';
  artistPill.dataset.filter = 'artist';
  artistPill.textContent = 'Artist';
  artistPill.style.display = 'none';
  pills.insertBefore(artistPill, certPill);
})();

document.getElementById('filter-pills').addEventListener('click', e => {
  const pill = e.target.closest('.filter-pill');
  if (!pill) return;
  setFilter(pill.dataset.filter);
});

// --- Tappable tags on cards ---
document.getElementById('cards').addEventListener('click', e => {
  const tag = e.target.closest('[data-filter][data-value]');
  if (!tag) return;
  searchByTag(tag.dataset.filter, tag.dataset.value);
});

// --- Event listeners ---

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelector('.tab.active').classList.remove('active');
    tab.classList.add('active');
    activeTab = tab.dataset.tab;
    // Reset to 'all' when switching tabs to avoid stuck filters
    activeFilter = 'all';
    updateFilterPills();
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  render();
});

document.getElementById('sort-btn').addEventListener('click', () => {
  const btn = document.getElementById('sort-btn');
  if (sortMode === 'name') {
    sortMode = 'year';
    btn.textContent = 'Year';
  } else {
    sortMode = 'name';
    btn.textContent = 'A-Z';
  }
  render();
});

// Oscar wins lookup: "lowercase title|year" => number of competitive wins

  // 6 wins

  "mary poppins|1964":5,"the aviator|2004":5,"hugo|2011":5,"braveheart|1995":5,
  // 4 wins
  "the godfather|1972":4,"unforgiven|1992":4,"chariots of fire|1981":4,"platoon|1986":4,
  "the departed|2006":4,"a beautiful mind|2001":4,"inception|2010":4,
  "indiana jones and the raiders of the lost ark|1981":4,"raiders of the lost ark|1981":4,
  "spartacus|1960":4,"terminator 2: judgment day|1991":4,"terminator 2 judgement day|1991":4,
  "the lord of the rings: the fellowship of the ring|2001":4,

  "rocky|1976":3,"casablanca|1943":3,"green book|2018":3,"12 years a slave|2013":3,

  "total recall|1990":1,"cinema paradiso|1988":1,"nuovo cinema paradiso|1988":1,
  "the ten commandments|1956":1,
  "the star wars: the empire strikes back|1980":1,
  "the empire strikes back|1980":1,
  "star wars: episode v - the empire strikes back|1980":1

function getOscarWins(name, year) {
  if (!name || !year) return 0;
  const key = name.toLowerCase().trim() + '|' + year;
  return OSCAR_WINS[key] || 0;
}

init();
</script>
</body>
</html>
